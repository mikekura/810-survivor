<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>810 SURVIVOR</title>
  <meta name="description" content="HTML5 + JavaScript 810 SURVIVOR. Mouse, touch, and keyboard supported.">
  <meta name="theme-color" content="#1b120d">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4337254889610557" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="./styles/main.css">

  <main class="app-shell">

      </div>
      <div class="app-badge">AUTO ATTACK / MOUSE CURSOR / SMARTPHONE READY</div>
    </header>

    <section id="ad-top" class="ad-slot" hidden aria-label="Advertisement"></section>

    <section class="game-frame">
      <canvas id="gameCanvas" width="960" height="720" aria-label="810 SURVIVOR game canvas"></canvas>
    </section>

    <section id="ad-bottom" class="ad-slot" hidden aria-label="Advertisement"></section>

    <footer class="app-footer">
      <p>Move with mouse cursor, touch drag, WASD, or arrow keys. `X` retries. `C` pauses.</p>
    </footer>
  </main>

  <noscript>JavaScript is required to play 810 SURVIVOR.</noscript>
